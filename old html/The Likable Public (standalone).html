document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

;\n  --reg-line:#15130e;\n  --reg-line-soft:#cfc8ba;\n  --reg-rad:0px;\n  --reg-track:-0.01em;\n  --reg-accent:#b6573a;\n}\n\n*{box-sizing:border-box;}\nhtml,body{height:100%;margin:0;overflow:hidden;}\nbody{\n  font-family:var(--grot);color:var(--reg-ink);\n  background:var(--reg-bg);\n  -webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;\n  transition:background-color .9s ease, color .9s ease;\n}\n\n#app{\n  height:100%;display:flex;flex-direction:column;\n  --bg-grad:linear-gradient(180deg,var(--reg-bg) 0%,var(--reg-bg2) 100%);\n}\n\n/* ---------------- TOPBAR ---------------- */\n.topbar{\n  flex:0 0 50px;display:flex;align-items:center;gap:22px;\n  padding:0 20px;border-bottom:1px solid var(--reg-line);\n  background:var(--reg-bg);\n  transition:background-color .9s ease, border-color .9s ease;\n  z-index:30;\n}\n.topbar .tb-title{\n  font-family:var(--grot);font-weight:700;font-size:14px;letter-spacing:.02em;\n  text-transform:uppercase;display:flex;align-items:center;gap:10px;white-space:nowrap;\n}\n.topbar .tb-title .dot{width:9px;height:9px;border-radius:50%;background:var(--reg-accent);transition:background-color .9s ease;}\n.topbar .tb-desc{\n  flex:1;text-align:center;font-family:var(--serif);font-style:italic;font-weight:300;\n  font-size:15px;color:var(--reg-soft);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;\n}\n.topbar .tb-right{display:flex;align-items:center;gap:12px;font-family:var(--mono);\n  font-size:11px;letter-spacing:.08em;text-transform:uppercase;color:var(--reg-soft);white-space:nowrap;}\n.topbar .tb-right .sep{opacity:.5;}\n.topbar .tb-right b{color:var(--reg-ink);font-weight:700;}\n@media(max-width:820px){ .topbar .tb-desc{display:none;} }\n\n/* ---------------- THREE COLUMNS ---------------- */\n.cols{flex:1;display:flex;min-height:0;}\n.canvas{\n  flex:1 1 0;min-width:0;position:relative;overflow:hidden;\n  background:var(--bg-grad);cursor:grab;touch-action:none;\n  transition:background .9s ease;\n}\n.canvas.dragging{cursor:grabbing;}\n.center{}\n\n/* canvas corner labels */\n.canvas .clabel{\n  position:absolute;top:12px;z-index:6;pointer-events:none;\n  font-family:var(--mono);font-size:9.5px;letter-spacing:.16em;text-transform:uppercase;\n  padding:5px 9px;color:#f4f2ec;\n}\n.canvas .clabel.in{left:12px;background:rgba(20,18,14,.82);}\n.canvas .clabel.out{left:12px;background:var(--terra);}\n.canvas .chint{\n  position:absolute;bottom:12px;left:12px;z-index:6;pointer-events:none;\n  font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;\n  color:var(--reg-soft);opacity:.8;transition:opacity .5s;\n}\n.canvas .czoom{\n  position:absolute;bottom:12px;right:12px;z-index:6;pointer-events:none;\n  font-family:var(--mono);font-size:9px;letter-spacing:.12em;text-transform:uppercase;\n  color:var(--reg-soft);opacity:.7;\n}\n\n.canvas-inner{position:absolute;left:0;top:0;width:0;height:0;transform-origin:0 0;will-change:transform;}\n.canvas-inner.animate{transition:transform .85s cubic-bezier(.22,.61,.36,1);}\n\n/* ---------------- CARDS ---------------- */\n.card{\n  position:absolute;width:146px;\n  background:#fff;border:1px solid var(--reg-line);border-radius:var(--reg-rad);\n  overflow:hidden;cursor:pointer;\n  transition:opacity .5s ease, filter .5s ease, transform .5s cubic-bezier(.22,.61,.36,1),\n             border-color .9s ease, border-radius .9s ease, box-shadow .3s ease;\n}\n.card .thumb{height:88px;position:relative;background:#cdcec6;overflow:hidden;}\n.card .thumb svg{width:100%;height:100%;display:block;}\n.card .cn{\n  padding:7px 9px 2px;font-family:var(--grot);font-weight:700;font-size:12px;\n  letter-spacing:-.01em;line-height:1.1;color:#211e17;\n}\n.card .crow{\n  padding:1px 9px 8px;display:flex;align-items:baseline;justify-content:space-between;gap:6px;\n}\n.card .lk{display:flex;align-items:baseline;gap:4px;}\n.card .cnum{font-family:var(--mono);font-size:13px;font-weight:700;color:#211e17;}\n.card .ck{font-family:var(--mono);font-size:8.5px;letter-spacing:.12em;text-transform:uppercase;color:var(--ink-4);}\n.card .crow .hk{font-size:11px;color:var(--ink-4);}\n.card.warm .crow .hk{color:var(--terra);}\n.card.warm .cnum{color:var(--terra-deep);}\n.card.warm .ck{color:var(--terra);}\n\n/* highlight / dim driven by active section */\n.canvas.guided .card{opacity:.28;filter:saturate(.45);}\n.canvas.guided .card.hot{opacity:1;filter:none;box-shadow:0 14px 30px -18px rgba(30,22,12,.5);}\n.canvas:not(.guided) .card{opacity:1;}\n\n/* tap pulse */\n.card.pulse{animation:cardPulse .5s ease;}\n@keyframes cardPulse{0%{transform:scale(1);}40%{transform:scale(1.07);}100%{transform:scale(1);}}\n.cnum.bump{animation:numBump .5s ease;}\n@keyframes numBump{0%{transform:translateY(0);}45%{transform:translateY(-3px);color:var(--terra);}100%{transform:translateY(0);}}\n\n/* ---------------- CENTER COLUMN ---------------- */\n.center{\n  flex:0 0 593px;max-width:593px;display:flex;flex-direction:column;min-height:0;\n  background:#ffffff;\n}\n.scrollwrap{flex:1;overflow-y:auto;overflow-x:hidden;scroll-behavior:smooth;}\n.scrollwrap::-webkit-scrollbar{width:9px;}\n.scrollwrap::-webkit-scrollbar-thumb{background:var(--reg-line-soft);}\n.essay{padding:30px 30px 60px;}\n\n.ess-lede{margin-bottom:10px;}\n.ess-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.24em;text-transform:uppercase;color:var(--reg-accent);transition:color .9s ease;}\n.ess-lede h1{\n  font-family:var(--grot);font-weight:700;font-size:31px;line-height:.98;\n  letter-spacing:var(--reg-track);margin:14px 0 12px;text-wrap:balance;color:var(--reg-ink);\n  transition:letter-spacing .9s ease, color .9s ease;\n}\n.ess-lede .deck{font-family:var(--serif);font-style:italic;font-weight:300;font-size:15.5px;\n  line-height:1.5;color:var(--reg-soft);margin:0 0 6px;text-wrap:pretty;}\n.ess-lede .byline{margin-top:14px;padding-top:12px;border-top:1px solid var(--reg-line-soft);\n  font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--reg-soft);\n  display:flex;gap:6px 16px;flex-wrap:wrap;}\n\n.ess-sec{padding:26px 0 6px;scroll-margin-top:10px;}\n.ess-kale{font-family:var(--mono);font-size:10px;letter-spacing:.2em;text-transform:uppercase;\n  color:var(--reg-accent);display:flex;align-items:center;gap:10px;margin:0 0 14px;transition:color .9s ease;}\n.ess-kale::before{content:\"\";flex:0 0 24px;height:1px;background:var(--reg-accent);transition:background-color .9s ease;}\n.ess-kale .n{color:var(--ink-4);}\n.ess-sec h2{font-family:var(--grot);font-weight:700;font-size:21px;line-height:1.08;\n  letter-spacing:var(--reg-track);margin:0 0 13px;text-wrap:balance;color:var(--reg-ink);\n  transition:letter-spacing .9s ease, color .9s ease;}\n.ess-sec p{margin:0 0 14px;font-size:14.5px;line-height:1.62;color:var(--reg-ink);transition:color .9s ease;}\n.ess-sec p .ref{font-family:var(--mono);font-size:.62em;vertical-align:super;color:var(--reg-accent);text-decoration:none;}\n.ess-sec em{font-style:italic;}\n.ess-sec strong{font-weight:700;}\n\n/* pull quote */\n.ess-pull{font-family:var(--serif);font-style:italic;font-weight:300;font-size:18.5px;line-height:1.36;\n  color:var(--reg-ink);margin:20px 0;padding:17px 0;text-wrap:pretty;\n  border-top:1px solid var(--reg-line);border-bottom:1px solid var(--reg-line);\n  transition:color .9s ease, border-color .9s ease;}\n.ess-pull cite{display:block;margin-top:11px;font-family:var(--mono);font-style:normal;\n  font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--reg-accent);transition:color .9s ease;}\n\n/* live readout at foot of section V */\n.live-readout{margin-top:24px;font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;\n  line-height:1.7;text-transform:uppercase;color:var(--reg-soft);opacity:.62;}\n.live-readout b{color:var(--reg-ink);font-weight:700;}\n\n/* ---------------- INLINE INTERACTIONS ---------------- */\n.tool{\n  border:1px solid var(--reg-line);border-radius:var(--reg-rad);background:var(--reg-bg2);\n  padding:15px 15px 16px;margin:22px 0 24px;\n  transition:border-color .9s ease, border-radius .9s ease, background-color .9s ease;\n}\n.tool .th{display:flex;align-items:baseline;justify-content:space-between;gap:8px;margin-bottom:12px;}\n.tool .th .t{font-family:var(--mono);font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--reg-ink);font-weight:700;}\n.tool .th .v{font-family:var(--mono);font-size:11px;color:var(--reg-accent);font-weight:700;}\n\n/* slider / tool lead-in line */\n.tool .tlead{font-family:var(--grot);font-weight:700;font-size:13px;letter-spacing:-.01em;\n  line-height:1.2;color:var(--reg-ink);margin-bottom:12px;transition:color .9s ease;}\n.tool .statelab{color:var(--reg-accent);transition:color .9s ease;}\n/* slider */\n.tool .ends{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;\n  letter-spacing:.1em;text-transform:uppercase;color:var(--reg-soft);margin-bottom:6px;}\n.tool input[type=range]{width:100%;-webkit-appearance:none;appearance:none;height:3px;background:var(--reg-line-soft);outline:none;margin:6px 0 4px;}\n.tool input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;width:18px;height:18px;border-radius:50%;\n  background:var(--reg-bg);border:1.5px solid var(--reg-ink);cursor:ew-resize;transition:border-color .9s ease;}\n.tool input[type=range]::-moz-range-thumb{width:18px;height:18px;border-radius:50%;background:var(--reg-bg);border:1.5px solid var(--reg-ink);cursor:ew-resize;}\n.tool .sublabel{font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;color:var(--reg-soft);margin-top:8px;line-height:1.5;}\n\n/* chips + text */\n.tool .chips{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:10px;}\n.tool .chip{font-family:var(--mono);font-size:10px;letter-spacing:.04em;padding:5px 9px;\n  border:1px solid var(--reg-line-soft);background:var(--reg-bg);color:var(--reg-ink);cursor:pointer;border-radius:var(--reg-rad);\n  transition:background-color .15s, color .15s, border-color .15s;}\n.tool .chip:hover{border-color:var(--terra);color:var(--terra-deep);}\n.tool .chip.used{background:var(--terra);color:#fff;border-color:var(--terra);}\n.tool textarea{width:100%;resize:none;font-family:var(--serif);font-size:14px;line-height:1.45;\n  padding:10px;border:1px solid var(--reg-line-soft);background:var(--reg-bg);color:var(--reg-ink);\n  min-height:62px;border-radius:var(--reg-rad);}\n.tool textarea:focus{outline:none;border-color:var(--terra);}\n.tool .applyrow{display:flex;justify-content:space-between;align-items:center;gap:10px;margin-top:9px;}\n.tool .hintsm{font-family:var(--mono);font-size:9px;letter-spacing:.06em;color:var(--reg-soft);}\n.tool button.apply{font-family:var(--mono);font-size:10px;letter-spacing:.12em;text-transform:uppercase;\n  border:1px solid var(--reg-ink);background:var(--reg-ink);color:var(--reg-bg);padding:8px 14px;cursor:pointer;\n  border-radius:var(--reg-rad);transition:opacity .2s, background-color .9s ease, color .9s ease;}\n.tool button.apply:hover{opacity:.82;}\n.tool button.apply:disabled{opacity:.4;cursor:default;}\n\n/* swap paragraph */\n.swap{cursor:pointer;}\n.swap .swap-label{font-family:var(--mono);font-size:9.5px;letter-spacing:.12em;text-transform:uppercase;\n  color:var(--reg-soft);margin-bottom:7px;display:flex;align-items:center;gap:8px;}\n.swap .swap-label .pip{width:7px;height:7px;border-radius:50%;background:var(--ink-4);transition:background-color .3s;}\n.swap.on .swap-label .pip{background:var(--terra);}\n.swap .swap-text{font-family:var(--serif);font-size:15px;line-height:1.5;color:var(--reg-ink);transition:color .3s;}\n.swap.on .swap-text{color:var(--terra-deep);font-style:italic;}\n.swap .swap-foot{font-family:var(--mono);font-size:9px;letter-spacing:.08em;color:var(--reg-soft);margin-top:8px;}\n\n/* static informational list */\n.untouched .ulist{display:flex;flex-direction:column;gap:11px;margin-top:4px;}\n.untouched .urow{display:flex;gap:11px;align-items:flex-start;}\n.untouched .uthumb{flex:0 0 52px;height:40px;border:1px solid var(--reg-line-soft);overflow:hidden;background:#cdcec6;}\n.untouched .uthumb svg{width:100%;height:100%;display:block;}\n.untouched .ubody .un{font-family:var(--grot);font-weight:700;font-size:12.5px;line-height:1.1;color:var(--reg-ink);}\n.untouched .ubody .ud{font-size:11.5px;line-height:1.4;color:var(--reg-soft);margin-top:2px;}\n.untouched .unum{margin-left:auto;font-family:var(--mono);font-size:11px;color:var(--ink-4);white-space:nowrap;padding-top:1px;}\n\n/* ---------------- CENTER FOOTER STRIP ---------------- */\n.center-foot{\n  flex:0 0 auto;border-top:1px solid var(--reg-line-soft);padding:10px 16px;\n  display:flex;align-items:center;justify-content:space-between;gap:12px;background:#ffffff;\n  transition:border-color .9s ease;\n}\n.center-foot .cf-label{font-family:var(--mono);font-size:9px;letter-spacing:.14em;text-transform:uppercase;color:var(--reg-soft);line-height:1.3;}\n.center-foot .cf-right{text-align:right;}\n.center-foot .cf-num{font-family:var(--grot);font-weight:700;font-size:23px;letter-spacing:-.02em;color:var(--reg-ink);transition:color .9s ease;}\n.center-foot .cf-num .hk{color:var(--terra);font-size:15px;margin-right:4px;}\n\n/* ---------------- REGISTER STAGES (cold → warm drift) ---------------- */\n#app[data-stage=\"1\"]{--reg-bg:#ecebe4;--reg-bg2:#e6e4dc;--reg-ink:#15130e;--reg-soft:#736c5f;--reg-line:#15130e;--reg-line-soft:#cfc8ba;--reg-rad:0px;--reg-track:-.005em;--reg-accent:#7d7869;}\n#app[data-stage=\"2\"]{--reg-bg:#ece8df;--reg-bg2:#e6e1d5;--reg-ink:#1b1710;--reg-soft:#776d5c;--reg-line:#2a2419;--reg-line-soft:#cdc4b2;--reg-rad:2px;--reg-track:-.012em;--reg-accent:#9a6a4a;}\n#app[data-stage=\"3\"]{--reg-bg:#ece4d6;--reg-bg2:#e7dcc9;--reg-ink:#241a11;--reg-soft:#7c6b55;--reg-line:#3a2a1b;--reg-line-soft:#cdbb9e;--reg-rad:5px;--reg-track:-.02em;--reg-accent:#b06038;}\n#app[data-stage=\"4\"]{--reg-bg:#eedcc8;--reg-bg2:#ecd2b6;--reg-ink:#311e12;--reg-soft:#876b50;--reg-line:#7a3f23;--reg-line-soft:#d6b78f;--reg-rad:9px;--reg-track:-.028em;--reg-accent:#b6573a;}\n#app[data-stage=\"5\"]{--reg-bg:#f0d7bd;--reg-bg2:#efcaa6;--reg-ink:#3a2114;--reg-soft:#946d4c;--reg-line:#b6573a;--reg-line-soft:#dcab7c;--reg-rad:14px;--reg-track:-.034em;--reg-accent:#c4502b;}\n#app{ transition:background .9s ease; }\n\n@media (prefers-reduced-motion: reduce){\n  .canvas-inner.animate{transition:none;}\n  .card{transition:opacity .2s, filter .2s;}\n}\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n\n\n<div id=\"app\" data-stage=\"1\">\n\n  <!-- ===================== TOPBAR ===================== -->\n  <header class=\"topbar\">\n    <div class=\"tb-title\"><span class=\"dot\"><\u002Fspan> The Likable Public<\u002Fdiv>\n    <div class=\"tb-desc\">scroll the essay · the corpus flanks you<\u002Fdiv>\n    <div class=\"tb-right\">\n      <span class=\"pct\">Likability <b id=\"pctVal\">0%<\u002Fb><\u002Fspan>\n      <span class=\"sep\">·<\u002Fspan>\n      <span class=\"tot\">Likes minted <b id=\"totVal\">0<\u002Fb><\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fheader>\n\n  <div class=\"cols\">\n\n    <!-- ===================== LEFT CANVAS (lived-in) ===================== -->\n    <div class=\"canvas guided\" id=\"leftCanvas\">\n      <div class=\"clabel in\">Lived-in<\u002Fdiv>\n      <div class=\"chint\" id=\"leftHint\">drag to pan · scroll to zoom<\u002Fdiv>\n      <div class=\"czoom\" id=\"leftZoom\">100%<\u002Fdiv>\n      <div class=\"canvas-inner\" id=\"leftInner\"><\u002Fdiv>\n    <\u002Fdiv>\n\n    <!-- ===================== CENTER ESSAY ===================== -->\n    <div class=\"center\">\n      <div class=\"scrollwrap\" id=\"scrollwrap\">\n        <div class=\"essay\">\n\n          <div class=\"ess-lede\">\n            <div class=\"ess-eyebrow\">Essay · The Likable Public<\u002Fdiv>\n            <h1>A space can do one of two things: it can work, or it can perform.<\u002Fh1>\n            <p class=\"deck\">On the left, the corpus as it is lived in. On the right, the same rooms learning to be looked at. Read down, and watch the difference accrue.<\u002Fp>\n            <div class=\"byline\"><span>after Han · Debord · Berger<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- SECTION I -->\n          <section class=\"ess-sec\" id=\"s1\" data-stage=\"1\" data-cluster=\"0\">\n            <div class=\"ess-kale\">I <span class=\"n\">— The Question<\u002Fspan><\u002Fdiv>\n            <p>Something happens to a public room when it stops being lived in and starts being looked at. It turns, very slightly, to face a camera that isn't there. The chairs angle toward a better composition; the light is chosen for how it falls in a photograph rather than on a body. The room is still a room. It has simply acquired an audience.<\u002Fp>\n            <p>Which raises the question this essay hands you and asks you to carry to the bottom: <strong>who is each room for — the person standing in it, or the photo of it?<\u002Fstrong><\u002Fp>\n            <div class=\"ess-pull\">The smooth is the temper of the age: polished, frictionless, depthless — a surface that asks nothing of you but a Like, and offends no one by being beautiful.\n              <cite>after Byung-Chul Han, Saving Beauty<\u002Fcite><\u002Fdiv>\n            <p>Han's <em>smooth<\u002Fem> is not a style. It is a social logic — a demand that everything become agreeable, that resistance be sanded away. Which is why the rooms in this essay are not ugly. <em>That<\u002Fem> is the problem. They are extremely likable, and likability has its own quiet politics.<\u002Fp>\n          <\u002Fsection>\n\n          <!-- MOMENT 1 — slider -->\n          <div class=\"tool\" id=\"toolSlider\">\n            <div class=\"tlead\">Drag to watch a room stop working and start performing.<\u002Fdiv>\n            <div class=\"th\"><span class=\"t statelab\" id=\"sliderState\">lived-in<\u002Fspan><span class=\"v\" id=\"sliderVal\">0.00<\u002Fspan><\u002Fdiv>\n            <div class=\"ends\"><span>lived-in<\u002Fspan><span>looked-at<\u002Fspan><\u002Fdiv>\n            <input type=\"range\" id=\"loraSlider\" min=\"0\" max=\"1\" step=\"0.01\" value=\"0\">\n            <div class=\"sublabel\">The slider maps to LoRA strength. At 0.00 the image is unmodified; at 1.00 the room performs for a camera that isn't there.<\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- SECTION II -->\n          <section class=\"ess-sec\" id=\"s2\" data-stage=\"2\" data-cluster=\"1\">\n            <div class=\"ess-kale\">II <span class=\"n\">— The Spectacle Set in Plaster<\u002Fspan><\u002Fdiv>\n            <p>Debord warned that the spectacle was never a pile of images — it was a relation between people, conducted through images. A room performing for a feed is exactly that relation, set in plaster and tile and warm indirect light.<\u002Fp>\n            <p>And here is the trap. The planner who specified terrazzo did not think <em>this will look like a café<\u002Fem>. They thought <em>this is the right material<\u002Fem> — durable, handsome, correct. The performing room is the one in which those two thoughts have become impossible to tell apart.<\u002Fp>\n          <\u002Fsection>\n\n          <!-- MOMENT 2 — prompt panel -->\n          <div class=\"tool\" id=\"toolCaption\">\n            <div class=\"th\"><span class=\"t\">Describe the room you want<\u002Fspan><span class=\"v\" id=\"capCount\">0 reframed<\u002Fspan><\u002Fdiv>\n            <div class=\"chips\" id=\"capChips\"><\u002Fdiv>\n            <textarea id=\"capText\">public waiting room,<\u002Ftextarea>\n            <div class=\"applyrow\">\n              <span class=\"hintsm\">The right canvas reframes around rooms matching the description. The left stays untouched.<\u002Fspan>\n              <button class=\"apply\" id=\"capApply\">apply →<\u002Fbutton>\n            <\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- MOMENT 3 — clickable paragraph -->\n          <div class=\"tool swap\" id=\"toolSwap\">\n            <div class=\"tlead\">Click the paragraph — watch the writing perform.<\u002Fdiv>\n            <div class=\"swap-label\"><span class=\"pip\"><\u002Fspan><span id=\"swapVer\">honest<\u002Fspan><\u002Fdiv>\n            <div class=\"swap-text\" id=\"swapText\">The waiting room was never designed for the person waiting. It was designed against waiting — against the body that does it: chairs bolted to the floor, a clock set just out of comfortable view, lighting tuned to discourage anyone from staying.<\u002Fdiv>\n            <div class=\"swap-foot\" id=\"swapFoot\">click to overwrite with performed copy<\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- SECTION III -->\n          <section class=\"ess-sec\" id=\"s3\" data-stage=\"3\" data-cluster=\"2\">\n            <div class=\"ess-kale\">III <span class=\"n\">— The Estate, Mid-Performance<\u002Fspan><\u002Fdiv>\n            <p>Berger described the gap between simply living and being aware of being seen. A waiting room that knew it was watched would rearrange its chairs. It would compose itself.<\u002Fp>\n            <p>That gap is the two canvases on either side of you. To the left, rooms doing their jobs. To the right, the same rooms performing them. Tap any card and it releases a number — likes leaping from single digits into five figures. <strong>The number is the thesis.<\u002Fstrong> Nothing structural has changed; only the regard has.<\u002Fp>\n          <\u002Fsection>\n\n          <!-- MOMENT 4 — counter-feed -->\n          <div class=\"tool untouched\" id=\"toolUntouched\">\n            <div class=\"th\"><span class=\"t\">Rooms that simply are<\u002Fspan><span class=\"v\">counter-feed<\u002Fspan><\u002Fdiv>\n            <div class=\"ulist\" id=\"untouchedList\"><\u002Fdiv>\n          <\u002Fdiv>\n\n          <!-- SECTION IV -->\n          <section class=\"ess-sec\" id=\"s4\" data-stage=\"4\" data-cluster=\"3\">\n            <div class=\"ess-kale\">IV <span class=\"n\">— What the Room Does to Itself<\u002Fspan><\u002Fdiv>\n            <p>There is a word that gives the game away: <em>inviting<\u002Fem>. The inviting space is the performed space. It has already imagined you into it; it has already been, in a sense, where you are now standing — anticipating your photograph before you arrive.<\u002Fp>\n            <div class=\"ess-pull\">The spectacle is not a heap of images. It is a relation between people, conducted through images — and a room can be built to hold it.\n              <cite>after Guy Debord, The Society of the Spectacle<\u002Fcite><\u002Fdiv>\n            <p>Notice the small red mark on some rooms to your left. A fire extinguisher: the one thing that cannot be refitted, exempt from the whole program. And yet in the real building it is not removed — it is moved behind a custom door, matched to the millwork. The room stays exactly as safe as before. It simply stops admitting it. That is the smoothest trick of all.<\u002Fp>\n          <\u002Fsection>\n\n          <!-- SECTION V -->\n          <section class=\"ess-sec\" id=\"s5\" data-stage=\"5\" data-cluster=\"4\">\n            <div class=\"ess-kale\">V <span class=\"n\">— Who Is It For<\u002Fspan><\u002Fdiv>\n            <p>The room that works is for the person standing in it. The room that performs is for the photo of the person standing in it. Between those two rooms a whole city has quietly been built — and not by architects alone, but by a public that has learned to want what photographs well.<\u002Fp>\n            <p>So: the corpus you have been reading through. Forty-nine civic rooms, most of them mid-performance, a few still holding out, one fire extinguisher that will not move. The likes go up either way.<\u002Fp>\n            <p class=\"live-readout\"><b id=\"roomsRefitted\">0<\u002Fb> rooms refitted out of 49 · <b id=\"likesMinted\">0<\u002Fb> likes minted this session<\u002Fp>\n          <\u002Fsection>\n\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- center footer
